<!DOCTYPE html>
<html>

<head>
    <title>Flipkart Product Tile</title>

    <style>
        .product {
            border: 1px solid #ccc;
            width: 220px;
            padding: 15px;
        }

        img {
            display: block;
            width: 200px;
        }

        .name {
            display: block;
            font-size: 20px;
            margin-top: 10px;
        }

        .price {
            display: inline-block;
            color: green;
            font-weight: bold;
        }

        .hide-price {
            display: none;
        }
    </style>
</head>

<body>

    <div class="product">
        <img src="iphone.jpg" alt="iPhone">

        <span class="name">Apple iPhone 15</span>

        <span class="price">₹69,999</span>

        <!-- To hide the price, change the class to:
    <span class="price hide-price">₹69,999</span>
    -->
    </div>

</body>

</html>
