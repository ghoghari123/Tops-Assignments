<!DOCTYPE html>
<html>

<head>
    <title>Zomato Restaurant Card</title>

    <style>
        .card {
            width: 300px;
            border: 2px solid gray;
            margin: 20px;
            padding: 15px;
        }

        .section {
            border-bottom: 1px solid lightgray;
            padding: 10px 0;
        }

        .section:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="section">
            <h2>Spice Villa</h2>
        </div>

        <div class="section">
            Cuisine: Gujarati & North Indian
        </div>

        <div class="section">
            ⭐ Rating: 4.5/5
        </div>
    </div>

</body>

</html>
