<!DOCTYPE html>
<html>

<head>
    <title>Movie Poster Grid</title>

    <style>
        .poster {
            position: relative;
            display: inline-block;
            margin: 15px;
        }

        .poster img {
            width: 180px;
            height: 250px;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: red;
            color: white;
            padding: 5px 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="poster">
        <img src="movie.jpg" alt="Movie Poster">
        <div class="badge">NEW</div>
    </div>

    <div class="poster">
        <img src="movie2.jpg" alt="Movie Poster">
    </div>

</body>

</html>
