<!DOCTYPE html>
<html>

<head>
    <title>Reusable CSS Class</title>

    <style>
        /* Reusable class reduces repeated margin and padding,
           making the CSS easier to maintain and update. */
        .spacing {
            margin: 20px;
            padding: 15px;
        }

        .box {
            border: 1px solid black;
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <div class="box spacing">
        Restaurant Card
    </div>

    <div class="box spacing">
        Product Card
    </div>

</body>

</html>
