<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flipkart Product Cards</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f1f3f6;">

    <div class="container mt-5">

        <h2 class="text-center mb-4">Flipkart Products</h2>

        <div class="row g-4">

            <!-- Product 1 -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <img src="./images/laptop.avif" class="card-img-top" alt="Dell Laptop" height="250">

                    <div class="card-body">
                        <h5 class="card-title">Dell Laptop</h5>
                        <p class="card-text">
                            Intel Core i5, 16GB RAM, 512GB SSD
                        </p>
                        <h4 class="text-success">₹69,999</h4>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>
                    </div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <img src="./images/blender.jpg" class="card-img-top" alt="Blender" height="250">

                    <div class="card-body">
                        <h5 class="card-title">Philips Blender</h5>
                        <p class="card-text">
                            750W Mixer Grinder with 3 Jars
                        </p>
                        <h4 class="text-success">₹3,499</h4>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <img src="./images/oven.jpg" class="card-img-top" alt="Microwave Oven" height="250">

                    <div class="card-body">
                        <h5 class="card-title">Samsung Microwave Oven</h5>
                        <p class="card-text">
                            28L Convection Microwave Oven
                        </p>
                        <h4 class="text-success">₹8,999</h4>

                        <button class="btn btn-primary">
                            Buy Now
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
