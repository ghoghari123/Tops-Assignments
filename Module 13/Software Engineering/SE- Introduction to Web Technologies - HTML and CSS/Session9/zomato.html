<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zomato Restaurants</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">Popular Restaurants</h2>

        <div class="row g-3">

            <div class="col-6">
                <div class="card p-3">
                    <h4>Spice Villa</h4>
                    <p>Gujarati, North Indian & Chinese Cuisine.</p>
                </div>
            </div>

            <div class="col-6">
                <div class="card p-3">
                    <h4>Sasumaa Gujarati Thali</h4>
                    <p>Unlimited Traditional Gujarati Thali.</p>
                </div>
            </div>

            <div class="col-6">
                <div class="card p-3">
                    <h4>Barbeque Nation</h4>
                    <p>Buffet with BBQ, Indian & Chinese dishes.</p>
                </div>
            </div>

            <div class="col-6">
                <div class="card p-3">
                    <h4>Domino's Pizza</h4>
                    <p>Pizza, Garlic Bread & Desserts.</p>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
