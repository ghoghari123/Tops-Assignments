<!DOCTYPE html>
<html>

<head>
    <title>Spotify Playlist</title>

    <style>
        .playlist {
            display: flex;
            gap: 15px;
        }

        .song {
            display: flex;
            align-items: center;
            width: 200px;
            height: 80px;
            border: 1px solid gray;
            padding: 10px;
            background: #1DB954;
            color: white;
        }
    </style>
</head>

<body>

    <h2>My Playlist</h2>

    <div class="playlist">

        <div class="song">Believer - Imagine Dragons</div>

        <div class="song">Perfect - Ed Sheeran</div>

        <div class="song">Shape of You - Ed Sheeran</div>

        <div class="song">Levitating - Dua Lipa</div>

        <div class="song">Blinding Lights - The Weeknd</div>

    </div>

</body>

</html>
