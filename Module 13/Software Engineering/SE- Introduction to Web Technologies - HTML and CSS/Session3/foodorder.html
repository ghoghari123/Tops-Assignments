<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Food Order</title>
</head>

<body>
    <h2>Zomato Food Order Form</h2>

    <form>

        <!-- Order ID is disabled because it is generated by the system
             and users should not be allowed to edit it. -->
        <label for="orderid">Order ID:</label><br>
        <input type="text" id="orderid" name="orderid" value="ORD12345" disabled><br><br>

        <label for="username">User Name:</label><br>
        <input type="text" id="username" name="username" required><br><br>

        <label for="food">Food Item:</label><br>
        <select id="food" name="food" required>
            <option value="" selected disabled>Select a Food Item</option>
            <option value="Gujarati Thali">Gujarati Thali</option>
            <option value="Pizza">Pizza</option>
            <option value="Masala Dosa">Masala Dosa</option>
        </select><br><br>

        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" min="1" required><br><br>

        <label for="instructions">Delivery Instructions:</label><br>
        <textarea id="instructions" name="instructions" rows="4" cols="40" placeholder="Enter delivery instructions..."
            required></textarea><br><br>

        <input type="submit" value="Place Order">
        <input type="reset" value="Clear">

    </form>

</body>

</html>
