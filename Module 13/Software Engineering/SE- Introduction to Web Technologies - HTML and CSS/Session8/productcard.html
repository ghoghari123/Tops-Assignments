<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Meta viewport for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Flipkart Product Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f1f3f6;
            padding: 20px;
        }

        .product-card {
            display: flex;
            align-items: center;
            width: 700px;
            margin: auto;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            gap: 20px;
        }

        .product-card img {
            width: 200px;
            height: 200px;
        }

        .details {
            flex: 1;
        }

        h2 {
            color: #2874f0;
            margin-bottom: 10px;
        }

        .price {
            color: green;
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: #fb641b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Breakpoint: 1200px */
        @media only screen and (max-width:1200px) {

            .product-card {
                width: 90%;
                padding: 18px;
                font-size: 18px;
            }

        }

        /* Breakpoint: 900px */
        @media only screen and (max-width:900px) {

            .product-card {
                width: 95%;
                padding: 15px;
                font-size: 16px;
            }

        }

        /* Breakpoint: 600px */
        @media only screen and (max-width:600px) {

            .product-card {
                flex-direction: column;
                text-align: center;
                padding: 10px;
                font-size: 14px;
            }

            .product-card img {
                width: 150px;
                height: 150px;
            }

        }
    </style>

</head>

<body>

    <div class="product-card">

        <img src="laptop.avif" alt="Product">

        <div class="details">

            <h2>Dell laptop</h2>

            <p>
                Intel Core i5 Processor, 16GB RAM,
                512GB SSD, 15.6-inch Full HD Display.
            </p>

            <div class="price">
                ₹69,999
            </div>

            <button>Buy Now</button>

        </div>

    </div>

</body>

</html>
