<!DOCTYPE html>
<html>

<head>
    <title>BookMyShow</title>

    <style>
        body {
            background: white;
            color: black;
            font-family: Arial;
            transition: 0.3s;
        }

        .dark-mode {
            background: #222;
            color: white;
        }

        button {
            padding: 10px 20px;
            margin: 20px;
        }
    </style>

</head>

<body>

    <h1>Avengers: Endgame</h1>

    <p>
        Action | Adventure | Sci-Fi
    </p>

    <button onclick="toggleMode()">
        Toggle Light/Dark Mode
    </button>

    <script>
        function toggleMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>

</html>
