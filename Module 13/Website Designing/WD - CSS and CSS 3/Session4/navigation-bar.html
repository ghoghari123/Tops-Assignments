<!DOCTYPE html>
<html>

<head>
    <title>Navigation Bar</title>
    <style>
        .navbar {
            background-color: #f1f1f1;
            padding: 15px;
        }

        .menu {
            display: inline-block;
            width: 100px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            background-color: lightgray;
            margin-right: 10px;
            border-radius: 5px;
        }

        .menu:hover {
            background-color: gray;
            color: white;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="menu">Home</div>
        <div class="menu">Search</div>
        <div class="menu">Explore</div>
        <div class="menu">Reels</div>
        <div class="menu">Profile</div>
    </div>

</body>

</html>
