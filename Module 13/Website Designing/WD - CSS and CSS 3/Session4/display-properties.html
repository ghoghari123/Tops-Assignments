<!DOCTYPE html>
<html>

<head>
    <title>Display Properties</title>
    <style>
        .home {
            display: block;
            background-color: lightblue;
            width: 300px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .explore {
            display: inline;
            background-color: lightgreen;
            padding: 10px;
        }

        .profile {
            display: inline-block;
            background-color: lightcoral;
            width: 150px;
            height: 80px;
            padding: 10px;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="home">Home (Block Element)</div>

    <span class="explore">Explore (Inline Element)</span>

    <div class="profile">Profile (Inline-Block Element)</div>

</body>

</html>
