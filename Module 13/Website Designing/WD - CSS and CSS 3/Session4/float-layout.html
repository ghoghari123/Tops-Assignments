<!DOCTYPE html>
<html>

<head>
    <title>Flipkart Style Layout</title>
    <style>
        .products {
            float: left;
            width: 70%;
            background-color: lightblue;
            padding: 10px;
        }

        .cart {
            float: right;
            width: 25%;
            background-color: lightgreen;
            padding: 10px;
        }

        .product {
            border: 1px solid black;
            margin: 10px 0;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="products">
            <h2>Product List</h2>

            <div class="product">Laptop</div>
            <div class="product">Mobile</div>
            <div class="product">Headphones</div>
            <div class="product">Keyboard</div>
            <div class="product">Mouse</div>

        </div>

        <div class="cart">
            <h2>Cart</h2>
            <p>1. Laptop</p>
            <p>2. Headphones</p>
            <p>Total: ₹65,000</p>
        </div>

    </div>

</body>

</html>
