<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zesty Zomato Bites</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .restaurant-description {
            color: blue;
        }
    </style>
</head>
<body>
    <h1 class="restaurant-heading">Zesty Zomato Bites</h1>

    <!-- The paragraph appears red because inline styles have higher priority than internal CSS in the cascade. -->
    <p class="restaurant-description" style="color: red;">
        Fresh, flavorful meals delivered with a Zomato-style dash of speed, spice, and happiness.
    </p>

    <h2>Menu</h2>
    <ul>
        <li class="menu-item">Paneer Tikka Pizza</li>
        <li class="menu-item" id="special-item">Chef's Special Biryani</li>
        <li class="menu-item">Masala Fries</li>
        <li class="menu-item">Chocolate Lava Cake</li>
    </ul>
</body>
</html>
