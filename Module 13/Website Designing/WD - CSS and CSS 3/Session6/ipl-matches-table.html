<!DOCTYPE html>
<html>

<head>
    <title>IPL Matches</title>
    <style>
        body {
            font-family: Arial;
        }

        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #1e88e5;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ffe082;
        }
    </style>
</head>

<body>

    <table border="1">
        <tr>
            <th>Team 1</th>
            <th>Team 2</th>
            <th>Score</th>
            <th>Winner</th>
        </tr>

        <tr>
            <td>RCB</td>
            <td>CSK</td>
            <td>185/6</td>
            <td>RCB</td>
        </tr>

        <tr>
            <td>MI</td>
            <td>GT</td>
            <td>172/8</td>
            <td>GT</td>
        </tr>

        <tr>
            <td>KKR</td>
            <td>RR</td>
            <td>195/5</td>
            <td>KKR</td>
        </tr>
    </table>

</body>

</html>
