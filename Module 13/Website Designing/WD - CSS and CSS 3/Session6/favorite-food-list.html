<!DOCTYPE html>
<html>

<head>
    <title>Favorite Food List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            margin: 10px 0;
            font-size: 20px;
            transition: color 0.3s;
        }

        li::before {
            content: "🍕 ";
            margin-right: 10px;
        }

        li:hover {
            color: red;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>My Favorite Foods</h2>

    <ul>
        <li>Pizza</li>
        <li>Burger</li>
        <li>Pasta</li>
        <li>Ice Cream</li>
        <li>Biryani</li>
    </ul>

</body>

</html>
