<!DOCTYPE html>
<html>

<head>
    <title>Button Hover Effect</title>
    <style>
        body {
            font-family: Arial;
        }

        .container {
            width: 300px;
            margin: 100px auto;
            text-align: center;
        }

        button {
            padding: 12px 30px;
            background-color: #1db954;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #14833b;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <button>Sign Up</button>
    </div>

</body>

</html>
