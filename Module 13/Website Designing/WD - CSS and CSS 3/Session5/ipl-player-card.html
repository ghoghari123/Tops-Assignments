<!DOCTYPE html>
<html>

<head>
    <title>IPL Player Card</title>
    <style>
        body {
            background: #f5f5f5;
        }

        .player-card {
            width: 320px;
            height: 450px;
            margin: 50px auto;
            background-image: url('https://picsum.photos/320/450');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            font-family: Arial;
        }

        .info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        .info h2 {
            text-shadow: 2px 2px 5px black;
            margin: 0;
        }

        .info p {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="player-card">
        <div class="info">
            <h2>Virat Kohli</h2>
            <p>Team: RCB</p>
            <p>Role: Batsman</p>
        </div>
    </div>

</body>

</html>
