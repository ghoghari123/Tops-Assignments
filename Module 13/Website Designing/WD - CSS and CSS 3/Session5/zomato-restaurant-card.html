<!DOCTYPE html>
<html>

<head>
    <title>Zomato Restaurant Card</title>
    <style>
        .restaurant {
            width: 350px;
            height: 250px;
            margin: 50px auto;
            background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 15px;
        }

        .name {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: Arial;
        }
    </style>
</head>

<body>

    <div class="restaurant">
        <div class="name">
            The Food Hub
        </div>
    </div>

</body>

</html>
