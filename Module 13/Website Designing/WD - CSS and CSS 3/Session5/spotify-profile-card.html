<!DOCTYPE html>
<html>

<head>
    <title>Spotify Artist Card</title>
    <style>
        .card {
            width: 300px;
            background-color: #1DB954;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }

        .card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://picsum.photos/150" alt="Artist">
        <h2>Arijit Singh</h2>
        <p>Monthly Listeners: 45M</p>
    </div>

</body>

</html>
