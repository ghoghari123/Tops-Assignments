<!DOCTYPE html>
<html>

<head>
    <title>Flipkart Product Card</title>
    <style>
        .product-card {
            width: 250px;
            padding: 20px;
            margin: 50px auto;
            background-color: white;
            text-align: center;
            font-family: Arial;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
        }

        img {
            width: 100%;
        }
    </style>
</head>

<body style="background:#f1f3f6;">

    <div class="product-card">
        <img src="https://picsum.photos/250/150" alt="Product">
        <h3>Wireless Headphones</h3>
        <p>₹1,999</p>
    </div>

</body>

</html>
