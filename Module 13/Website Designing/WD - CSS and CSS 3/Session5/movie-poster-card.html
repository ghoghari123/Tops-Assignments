<!DOCTYPE html>
<html>

<head>
    <title>Movie Poster</title>
    <style>
        .poster {
            width: 300px;
            height: 450px;
            margin: 50px auto;
            background-image: url('https://picsum.photos/300/450');
            background-size: cover;
            position: relative;
            color: white;
            font-family: Arial;
        }

        h1 {
            position: absolute;
            bottom: 20px;
            left: 20px;
            text-shadow: 3px 3px 6px black;
        }
    </style>
</head>

<body>

    <div class="poster">
        <h1>KGF Chapter 2</h1>
    </div>

</body>

</html>
