<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object</title>
</head>

<body>
    <script>

        // o Create a JavaScript object car with properties brand, model, and year
        let car = {
            brand: "BMW",
            model: "X5",
            year: 2023
        }
        console.log(car);

        // Access and print the car’s brand and model.
        console.log("Brand : ", car.brand, "\n Model : ", car.model);

        // Update the year property.
        car.year = 2025;
        console.log("Updated year : ", car.year);

        // Add a new property color to the car object.
        car.color = "Black";
        console.log(car);

    </script>
</body>

</html>
