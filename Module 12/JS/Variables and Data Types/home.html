<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        console.log(" ------------- VARIABLES -------------");
        let n = 20;
        console.log("Let : ", n);

        const name = "HemuDelu"
        console.log("Const : ", name);

        var a = 20, b = 10;
        console.log("Var : ", a, b);


        // ================================== DATA TYPES ================================================
        console.log(" ------------- DATA TYPES -------------");

        // ---------- [1] NUMBER
        let num = 108;
        console.log("num :: ", num, typeof (num));

        // ---------- [1] BOOLEANS
        let value = true;
        console.log("value :: ", value, typeof (value));

        // ---------- [1] STRING
        let n_a_m_e = "RAM_SITA";
        console.log("Name :: ", n_a_m_e, typeof (n_a_m_e));

        // ---------- [1] NULL
        let h1 = null;
        console.log("h1 :: ", h1, typeof (h1));
        // ---------- [1] UNDEFINE
        let b1;
        console.log("b1 :: ", b1, typeof (b1));

        // ---------- [1] OBJECT
        let string = {
            na_me: "radhe_radhe"
        }
        console.log("string :: ", string, typeof (string));
    </script>
</body>

</html>
