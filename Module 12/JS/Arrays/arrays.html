<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays</title>
</head>

<body>
    <script>
        // Declare an array of fruits (["apple", "banana", "cherry"])
        // Log the modified array to the console.
        console.log("------------- Array Add & Remove Operations ------------- ");
        let fruits = ["apple", "banana", "cherry"];
        console.log(fruits);

        // Add a fruit to the end of the array.
        console.log(fruits.push("graps"));
        console.log(fruits);

        // Remove the first fruit from the array.
        console.log(fruits.shift());
        console.log(fruits);


        // Write a program to find the sum of all elements in an array of numbers.
        console.log("------------- Sum of Array Elements ------------- ");
        let NumberList, sum;
        NumberList = [10, 20, 30, 40, 50];
        sum = NumberList.reduce((acc, curr) => acc + curr, 0);
        console.log(NumberList,sum);
    </script>
</body>

</html>
