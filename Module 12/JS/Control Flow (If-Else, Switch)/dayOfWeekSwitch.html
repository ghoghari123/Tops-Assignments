<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Statement</title>
</head>

<body>
    <script>
        document.write(
            "1 - Monday <br> ",
            "2 - Tuesday <br> ",
            "3 - Wednesday <br> ",
            "4 - Thursday <br> ",
            "5 - Friday <br> ",
            "6 - Saturday <br> ",
            "7 - Sunday <br> "
        );
        let choice = Number(prompt("Enter Your Choice : "));
        switch (choice) {
            case 1:
                document.write("Monday")
                break;
            case 2:
                document.write("Tuesday")
                break;
            case 3:
                document.write("Wednesday")
                break;
            case 4:
                document.write("Thursda")
                break;
            case 5:
                document.write("Friday")
                break;
            case 6:
                document.write("Saturday")
                break;
            case 7:
                document.write("Sunday")
                break;
            default:
                document.write("Invalid Choice..!")
                break;
        }
    </script>
</body>

</html>
