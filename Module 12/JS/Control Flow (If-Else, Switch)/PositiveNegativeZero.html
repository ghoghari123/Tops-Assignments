<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Control Flow || If-Else</title>
</head>

<body>
    <script>
        let n1;

        n1 = prompt("Enter The Value Of N1");

        n1 = Number(n1);

        if (n1 > 0) {
            console.log("Positive Number");
        }
        else if (n1 < 0) {
            console.log("Negative Number");
        } 
        else if (n1 == 0) {
            console.log("Zero Number");
        }
        else {
            console.log("Please Enter Number");
        }
    </script>
</body>

</html>
