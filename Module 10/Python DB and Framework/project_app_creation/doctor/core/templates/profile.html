{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Profile</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        /* Layout */
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            padding: 20px;
        }

        /* Form panel (hidden by default) */
        .update-panel {
            width: 350px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .update-panel.active {
            display: block;
        }

        .update-panel input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>

<body>

    <h1>Doctor Finder</h1>

    <nav>
        <a href="{% url 'home'%}">Home</a>
        <a href="{% url 'contact'%}">Contact</a>
    </nav>

    <div class="profile-container">

        <!-- ✅ Doctor Card -->
        <div class="card" style="max-width: 400px;">

            <div class="image-box">
                {% if doctor.image %}
                <img src="{{ doctor.image.url }}">
                {% else %}
                <img src="{% static 'images/default.png' %}">
                {% endif %}
            </div>

            <div class="card-body">
                <h3>Dr. {{ doctor.name }}</h3>

                <p><strong>Specialization:</strong> {{ doctor.specialization }}</p>
                <p><strong>Experience:</strong> {{ doctor.experience }} years</p>
                <p><strong>City:</strong> {{ doctor.city }}</p>

                <div style="margin-top: 15px;">
                    <button onclick="openForm()" class="btn">✏️ Update</button>
                    <a href="{% url 'delete' doctor.id %}" class="btn delete">❌ Delete</a>
                </div>
            </div>

        </div>

        <!-- ✅ Update Form (Side Panel) -->
        <div id="updateForm" class="update-panel">

            <h2>Update Doctor</h2>

            <form method="POST" action="{% url 'update' doctor.id %}" enctype="multipart/form-data">
                {% csrf_token %}

                <input type="text" name="name" value="{{ doctor.name }}" placeholder="Name">

                <input type="text" name="specialization" value="{{ doctor.specialization }}"
                    placeholder="Specialization">

                <input type="number" name="experience" value="{{ doctor.experience }}" placeholder="Experience">

                <input type="text" name="city" value="{{ doctor.city }}" placeholder="City">

                <input type="file" name="image">

                <button type="submit" class="btn">Save</button>
                <button type="button" onclick="closeForm()" class="btn delete">Close</button>
            </form>

        </div>

    </div>

    <br>
    <a href="{% url 'home'%}">⬅ Back to Home</a>

    <!-- ✅ JS -->
    <script>
        function openForm() {
            document.getElementById("updateForm").classList.add("active");
        }

        function closeForm() {
            document.getElementById("updateForm").classList.remove("active");
        }
    </script>

</body>

</html>
