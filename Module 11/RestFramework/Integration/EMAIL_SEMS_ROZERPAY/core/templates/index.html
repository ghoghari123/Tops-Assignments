<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communication Center</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <style>
        body {
            background: linear-gradient(120deg, #edf2ff, #f8f9fa);
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-title {
            background: #0d6efd;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .custom-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-send {
            border-radius: 10px;
            font-weight: 600;
        }

        .d-none {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container py-4">

        <div class="main-title">
            📨 Communication Center
        </div>

        <!-- 🔘 TOP BUTTONS -->
        <div class="text-center mb-4">
            <button class="btn btn-primary me-2" onclick="showSection('email')">📧 Email</button>
            <button class="btn btn-success me-2" onclick="showSection('sms')">📱 SMS</button>
            <button class="btn btn-dark" onclick="showSection('payment')">💳 Payment</button>
        </div>

        <!-- 📧 EMAIL -->
        <div id="emailSection" class="card custom-card p-4">
            <h5 class="text-primary text-center mb-3">Send Email</h5>

            <form action="{%url 'sendmail'%}" method="post">
                {%csrf_token%}

                <input type="email" class="form-control mb-3" name="from" placeholder="From Email">
                <input type="text" class="form-control mb-3" name="subject" placeholder="Subject">

                <textarea rows="5" class="form-control mb-3" name="message" placeholder="Write email..."></textarea>

                <button type="submit" class="btn btn-primary w-100 btn-send">Send Email</button>
            </form>
        </div>

        <!-- 📱 SMS -->
        <div id="smsSection" class="card custom-card p-4 d-none">
            <h5 class="text-success text-center mb-3">Send SMS</h5>

            <form action="{%url 'sendsms'%}" method="post">
                {%csrf_token%}

                <input type="tel" class="form-control mb-3" name="phone" placeholder="Phone Number">

                <textarea rows="5" class="form-control mb-3" name="message" placeholder="Write SMS..."></textarea>

                <button type="submit" class="btn btn-success w-100 btn-send">Send SMS</button>
            </form>
        </div>

        <!-- 💳 PAYMENT -->
        <div id="paymentSection" class="card custom-card p-4 d-none text-center">
            <h5 class="text-dark mb-3">Razorpay Payment</h5>

            <input type="number" id="amt" class="form-control mb-3" placeholder="Enter Amount ₹">

            <button id="rzp-button1" class="btn btn-warning w-100 btn-send">
                Pay Now
            </button>
        </div>

    </div>

    <!-- ✅ SWITCH SCRIPT -->
    <script>
        function showSection(section) {

            document.getElementById('emailSection').classList.add('d-none');
            document.getElementById('smsSection').classList.add('d-none');
            document.getElementById('paymentSection').classList.add('d-none');

            if (section === 'email') {
                document.getElementById('emailSection').classList.remove('d-none');
            }
            if (section === 'sms') {
                document.getElementById('smsSection').classList.remove('d-none');
            }
            if (section === 'payment') {
                document.getElementById('paymentSection').classList.remove('d-none');
            }
        }
    </script>

    <!-- 💳 RAZORPAY -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        document.getElementById('rzp-button1').onclick = function (e) {

            e.preventDefault();
            var amt = $("#amt").val();

            $.get("payment", { amt }, function (rt) {

                var options = {
                    "key": "rzp_test_SZnPkzoYIJMiAl",
                    "amount": rt.amount,
                    "currency": "INR",
                    "name": "Tops Tech",
                    "description": "Test Transaction",
                    "order_id": rt.id,
                    "handler": function (response) {
                        alert("Payment ID: " + response.razorpay_payment_id);
                    }
                };

                var rzp1 = new Razorpay(options);
                rzp1.open();
            });
        }
    </script>

</body>

</html>
